@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0b0b0a; --paper:#ffffff; --panel:#ffffff; --line:#e5e2d9;
  --gold:#c9a227; --gold-deep:#9c7d13; --gold-soft:#f7f0da;
  --graphite:#565550; --mute:#8c8a83;
  --ok:#2e7d46; --warn:#b26a00; --danger:#b3261e;
}
html,body,#root{height:100%}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.disp{font-family:'Archivo','Inter',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%}
input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
a{color:inherit}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;color:var(--ink);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line)}
.topbar-logo{height:38px;width:auto;display:block}
@media(max-width:520px){.topbar-logo{height:32px}}
.topbar .who{margin-left:auto;text-align:right;line-height:1.25}
.topbar .who b{font-size:13px;display:block}
.topbar .who span{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:1px}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;padding:8px;border-radius:10px;color:inherit}
.iconbtn:hover{background:rgba(0,0,0,.06)}

.nav{display:flex;gap:4px;overflow-x:auto;background:#fff;padding:6px 10px 10px;position:sticky;top:57px;z-index:39;scrollbar-width:none;border-bottom:1px solid var(--line)}
.nav::-webkit-scrollbar{display:none}
.nav button{display:flex;align-items:center;gap:7px;color:var(--graphite);padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;white-space:nowrap}
.nav button.on{background:var(--gold);color:var(--ink)}
.nav button:not(.on):hover{background:rgba(0,0,0,.05);color:var(--ink)}

.page{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:20px 16px 90px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-deep);font-weight:700;font-family:'Archivo'}
.page-head h1{font-size:26px;font-weight:800;letter-spacing:-.3px}
.page-head p{color:var(--graphite);font-size:14px;max-width:640px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi .n{font-family:'Archivo';font-size:30px;font-weight:800;line-height:1.1}
.kpi .l{font-size:12px;color:var(--graphite);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:2px}
.kpi.gold{background:#fff;border:1.5px solid var(--gold)}
.kpi.gold .n{color:var(--gold-deep)}
.kpi.gold .l{color:var(--graphite)}

.btn{display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:10px 16px;font-weight:600;font-size:14px;border:1px solid var(--line);background:#fff}
.btn:hover{border-color:var(--graphite)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.btn.gold:hover{background:var(--gold-deep);border-color:var(--gold-deep);color:#fff}
.btn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.danger{background:#fff;border-color:var(--danger);color:var(--danger)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:99px;text-transform:uppercase}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--graphite)}
.chip.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.click{cursor:pointer}

.stars{display:inline-flex;gap:2px}
.stars .star{color:#d8d5cb;padding:1px;display:inline-flex}
.stars .star.on{color:var(--gold)}
.score-pill{display:inline-flex;align-items:center;gap:6px;font-family:'Archivo';font-weight:800;font-size:15px;border-radius:99px;padding:4px 12px;color:#fff}

.ovl{position:fixed;inset:0;background:rgba(11,11,10,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--paper);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px 18px 32px;animation:up .18s ease-out}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
@media(min-width:720px){.ovl{align-items:center;padding:24px}.modal{border-radius:20px;padding:26px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.modal-head h2{font-size:20px;font-weight:800}

.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--graphite);margin-bottom:5px;letter-spacing:.3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}

.list-item{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.list-item:hover{background:#fdfcf8}
.list-item .t{font-weight:700;font-size:15px}
.list-item .s{font-size:12.5px;color:var(--graphite)}

.funnel{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;scroll-snap-type:x mandatory}
.fcol{min-width:262px;width:262px;scroll-snap-align:start;flex-shrink:0}
.fcol-head{background:#fff;color:var(--ink);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fcol-head .num{font-family:'Archivo';font-weight:800;color:var(--gold);font-size:17px}
.fcol-head .nm{font-weight:700;font-size:13.5px;letter-spacing:.3px;flex:1}
.fcol-head .ct{background:rgba(0,0,0,.07);border-radius:99px;padding:1px 9px;font-size:12px;font-weight:700}
.fcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px;cursor:pointer}
.fcard:hover{border-color:var(--gold)}
.fcard .nm{font-weight:700;font-size:14.5px;margin-bottom:3px}
.fcard .meta{font-size:12px;color:var(--graphite);display:flex;align-items:center;gap:5px;flex-wrap:wrap}

.alert-line{display:flex;gap:10px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.alert-line:last-child{border-bottom:none}
.alert-line .t{font-weight:600;font-size:14px}
.alert-line .s{font-size:12.5px;color:var(--graphite)}

.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:14px;overflow-x:auto}
.tabs button{padding:9px 14px;font-weight:700;font-size:13.5px;color:var(--graphite);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tabs button.on{color:var(--ink);border-color:var(--gold)}

.selo{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:86px;height:86px;border-radius:50%;border:2.5px solid var(--gold);color:var(--gold-deep);text-align:center;transform:rotate(-8deg);font-family:'Archivo',sans-serif}
.selo b{font-size:10.5px;letter-spacing:1.4px;font-weight:800}
.selo span{font-size:8.5px;letter-spacing:1px}

.bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--gold);border-radius:99px}

.acad-step{border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:12px;overflow:hidden}
.acad-head{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer}
.acad-num{font-family:'Archivo';font-weight:800;font-size:24px;color:var(--gold);min-width:40px}
.acad-body{padding:0 16px 18px;border-top:1px solid var(--line);padding-top:14px}
.acad-sec{margin-bottom:14px}
.acad-sec h4{font-size:12px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-deep);margin-bottom:7px}
.acad-sec li{margin-left:18px;margin-bottom:5px;font-size:14px}
.acad-sec p{font-size:14px;color:var(--graphite)}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:14px;font-weight:600;font-size:14px;z-index:90;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;gap:9px;align-items:center;max-width:92vw}
.toast .g{color:var(--gold)}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;padding:20px}
.login-card{width:100%;max-width:400px;background:#fff;border:1.5px solid var(--gold);border-radius:20px;overflow:hidden;box-shadow:0 6px 24px rgba(201,162,39,.08)}
.login-logo{padding:26px 26px 14px;text-align:center}
.login-logo img{width:100%;max-width:220px;display:block;margin:0 auto}
.login-logo .tag{font-size:12.5px;color:var(--graphite);font-weight:600;margin-top:12px;letter-spacing:.2px}
.login-divider{height:1px;background:linear-gradient(to right, transparent, var(--gold-soft) 20%, var(--gold-soft) 80%, transparent);margin:0 22px}
.login-form{padding:22px 26px 26px}
.linklike{display:block;margin:14px auto 0;font-size:13.5px;font-weight:600;color:var(--gold-deep);text-decoration:underline;background:none;border:none;cursor:pointer;width:100%;text-align:center}
.gold-rule{height:3px;background:var(--gold);border-radius:99px;width:56px;margin:10px 0 14px}
.empty{padding:34px 16px;text-align:center;color:var(--graphite)}
.empty svg{color:var(--mute);margin-bottom:8px}
.hint{font-size:12.5px;color:var(--mute)}
